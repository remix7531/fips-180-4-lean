<style>
body {
  max-width: 52em;
  margin: 2em auto;
  padding: 0 1.5em;
  font-family: "Georgia", "Times New Roman", serif;
  font-size: 1.05rem;
  line-height: 1.6;
  color: #222;
}

h1, h2, h3, h4 {
  font-family: "Helvetica Neue", "Arial", sans-serif;
  margin-top: 1.8em;
  color: #111;
}

h1 { border-top: 1px solid #ddd; padding-top: 0.3em; }
.no-rule { border-top: none !important; padding-top: 0 !important; margin-top: 0 !important; }
hr { border: 0; border-top: 1px solid #ddd; margin: 1.8em 0; }
hr.heavy { border-top: 1px solid #000; }

.doc-logo { display: block; margin: 1.5em 0; width: 180px; height: auto; }

a { color: #0000EE; }
a:visited { color: #551A8B; }

pre {
  background: #f5f5f5;
  border: 1px solid #ddd;
  border-radius: 4px;
  padding: 0.8em 1em;
  overflow-x: auto;
  font-size: 0.92em;
  line-height: 1.45;
}

code {
  font-family: "JetBrains Mono", "Fira Code", "Consolas", monospace;
  font-size: 0.9em;
}

p > code, li > code {
  background: #f0f0f0;
  padding: 0.15em 0.35em;
  border-radius: 3px;
}

table {
  border-collapse: collapse;
  margin: 1em 0;
  width: 100%;
}

th, td {
  border: 1px solid #ccc;
  padding: 0.4em 0.8em;
  text-align: left;
}

th { background: #f5f5f5; font-weight: 600; }

blockquote {
  border-left: 3px solid #ccc;
  margin-left: 0;
  padding-left: 1.2em;
  color: #444;
}

mjx-container[display="true"] {
  margin: 1.6em 0 !important;
}

mjx-container mjx-mtr {
  padding: 0.15em 0;
}

#TOC a {
  color: #0000EE;
  text-decoration: none;
}
#TOC a:hover { text-decoration: underline; }

#TOC > ul > li { font-weight: 700; }
#TOC > ul > li + li { margin-top: 0.6em; }
#TOC > ul > li ul { font-weight: 400; }

.eqn-flex {
  display: flex;
  align-items: center;
  gap: 1em;
}
.eqn-flex .eqn-code { flex: 1; min-width: 0; }
.eqn-flex .eqn-code .sourceCode { margin: 0; }
.eqn-flex .eqn-code pre { margin: 0; }
.eqn-flex .eqn-tag { white-space: nowrap; }
/* `.eqn-row` is a normal block so its top/bottom margins collapse with
   adjacent `<pre>` blocks, matching the spacing of untagged code. */
.eqn-row { margin: 1em 0; }
</style>
