name: CI

on:
  push:
    branches: [main]
  pull_request:

# Allow a single Pages deploy at a time, cancel older runs.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact: ${{ steps.upload.outputs.artifact_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      # Installs elan, restores the `.lake` cache (SHA-stamped key with
      # prefix-based restore-keys), runs `lake exe cache get` to pull
      # Mathlib's prebuilt oleans, and runs `lake build`.
      - name: Build Lean
        uses: leanprover/lean-action@v1
        with:
          build-args: "spec impl equiv tests"
          test: "false"
          lint: "true"

      - name: Run NIST CAVP test vectors
        run: make test

      - name: Build HTML
        run: make html

      - name: Prepare Pages artifact
        # Serve the rendered spec at the site root.
        run: mv docs/FIPS-180-4.html docs/index.html

      - name: Upload Pages artifact
        id: upload
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
